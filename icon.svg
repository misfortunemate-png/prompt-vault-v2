    <!-- Inner V -->
    <text x="0" y="25" text-anchor="middle" font-family="Georgia,serif" 
          font-size="120" font-style="italic" fill="#f5f0e8" letter-spacing="-5">V</text>
  </g>
  <!-- Bottom text -->
  <text x="256" y="430" text-anchor="middle" font-family="Georgia,serif" 
        font-size="36" fill="#9a8870" letter-spacing="8">VAULT</text>
</svg>
